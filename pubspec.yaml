name: apj_true_life
description: APJ TRUE LIFE - Ayurvedic Medical Centre Patient App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  dio: ^5.4.3
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  firebase_messaging: ^15.0.4
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.8
  pinput: ^3.0.1
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700

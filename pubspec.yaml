name: apj_true_life
description: APJ TRUE LIFE Ayurvedic Medical Centre - Patient Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0
  go_router: ^13.0.0
  dio: ^5.3.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  web_socket_channel: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/fonts/

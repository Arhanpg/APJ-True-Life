name: apj_true_life
description: APJ TRUE LIFE — Ayurvedic Digital Health Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1
  # Navigation
  go_router: ^13.2.0
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  firebase_messaging: ^14.9.4
  # HTTP
  dio: ^5.4.3
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  # WebSocket
  web_socket_channel: ^3.0.0
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

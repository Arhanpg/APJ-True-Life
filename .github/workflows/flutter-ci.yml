# ============================================================
# APJ TRUE LIFE — Flutter CI (master branch)
# Flutter app lives at ROOT of master branch (not apps/mobile)
# ============================================================
name: CI — Flutter Mobile

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  flutter-analyze:
    name: "Flutter / Dart Analyze"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true
      - name: Get packages
        run: flutter pub get
      - name: Dart static analysis
        run: flutter analyze
        continue-on-error: true

  flutter-test:
    name: "Flutter / Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true
      - name: Get packages
        run: flutter pub get
      - name: Run tests
        run: flutter test

  flutter-build-android:
    name: "Flutter / Build Android APK"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true
      - name: Get packages
        run: flutter pub get
      - name: Build debug APK
        # Will succeed once google-services.json is added (gitignored).
        # CI builds without Firebase — Firebase is runtime only.
        run: flutter build apk --debug
        continue-on-error: true

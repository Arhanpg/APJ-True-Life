# ============================================================
# APJ TRUE LIFE — Flutter CI (master branch)
# Covers: Flutter mobile patient app (apps/mobile)
#
# WHY this file is on MASTER (not main):
#   GitHub Actions reads workflow .yml files from the branch
#   that was pushed to. The Flutter app lives on master.
#   So this file MUST exist on master to trigger on master pushes.
# ============================================================
name: CI — Flutter Mobile

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  flutter-analyze:
    name: "Flutter / Dart Analyze"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      - name: Get packages
        run: flutter pub get
      - name: Dart static analysis
        run: flutter analyze
        continue-on-error: true  # Warnings allowed during active development

  flutter-test:
    name: "Flutter / Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      - name: Get packages
        run: flutter pub get
      - name: Run tests
        run: flutter test

  flutter-build-android:
    name: "Flutter / Build Android APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true
      - name: Get packages
        run: flutter pub get
      - name: Build debug APK
        # continue-on-error: will fail until firebase_options.dart is configured.
        # Remove this once Firebase project is set up and flutterfire configure is run.
        run: flutter build apk --debug
        continue-on-error: true

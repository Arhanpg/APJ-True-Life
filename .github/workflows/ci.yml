name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────
  # Backend: Build + Test (all Spring Boot services)
  # Uses a local Postgres 16 container — NO cloud credentials.
  # ──────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apjdev
          POSTGRES_PASSWORD: apjdev
          POSTGRES_DB: apjtruelife
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # CI uses local Postgres — session-mode string for Flyway
      DATABASE_URL_SESSION: jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev
      # CI uses local Postgres — transaction-mode string for runtime (same local DB in CI)
      DATABASE_URL_RUNTIME: jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev&prepareThreshold=0
      # Stub values for CI — real secrets never touch CI
      JWT_PRIVATE_KEY: CI_STUB_PRIVATE_KEY
      JWT_PUBLIC_KEY: CI_STUB_PUBLIC_KEY
      OTP_HASH_PEPPER: ci-test-pepper-not-real
      SMS_GATEWAY_PROVIDER: mock
      SMS_GATEWAY_API_KEY: mock
      SMS_GATEWAY_SENDER_ID: APJTRL
      SMS_GATEWAY_TEMPLATE_ID: mock
      INTERNAL_GATEWAY_SECRET: ci-internal-secret
      SPRING_PROFILES_ACTIVE: local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build & Test all services
        working-directory: services
        run: ./gradlew build test --parallel --continue

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: services/**/build/reports/tests/

  # ──────────────────────────────────────────────────────────
  # Frontend Web: Next.js lint + type-check + test
  # ──────────────────────────────────────────────────────────
  web:
    name: Web Dashboard — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test -- --passWithNoTests

  # ──────────────────────────────────────────────────────────
  # Mobile: Flutter analyze
  # ──────────────────────────────────────────────────────────
  mobile:
    name: Flutter App — Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Flutter analyze
        working-directory: apps/mobile
        run: flutter analyze

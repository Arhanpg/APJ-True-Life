name: APJ True Life CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Spring Boot Services ───────────────────────────────────────────────────
  spring-boot:
    name: Spring Boot Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - treatment-service
          - appointment-service
          - chat-service
          - notification-service
          - media-service
    defaults:
      run:
        working-directory: services

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build ${{ matrix.service }}
        run: ./gradlew :${{ matrix.service }}:build -x test --no-daemon
        env:
          # Stub Firebase config for CI builds
          FIREBASE_SERVICE_ACCOUNT_JSON: 'CI_STUB'
          JWT_RS256_PRIVATE_KEY: 'CI_STUB'
          JWT_RS256_PUBLIC_KEY: 'CI_STUB'
          SPRING_DATASOURCE_URL: 'jdbc:postgresql://localhost:5432/test?prepareThreshold=0'
          SPRING_DATASOURCE_USERNAME: 'test'
          SPRING_DATASOURCE_PASSWORD: 'test'

  # ─── Next.js Dashboard ───────────────────────────────────────────────────────
  nextjs:
    name: Next.js Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://bwozwxrzotnlajutxupm.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_stub_anon_key
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1

  # ─── Flutter App ─────────────────────────────────────────────────────────────
  flutter:
    name: Flutter App Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create stub .env file
        run: |
          cat > .env << 'EOF'
          SUPABASE_URL=https://bwozwxrzotnlajutxupm.supabase.co
          SUPABASE_ANON_KEY=ci_stub_anon_key
          API_GATEWAY_BASE_URL=http://localhost:8080
          SENTRY_DSN=
          EOF

      - name: Create stub google-services.json
        run: |
          mkdir -p android/app
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {"project_number":"000000000000","project_id":"ci-stub","storage_bucket":"ci-stub.appspot.com"},
            "client": [{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.apjtruelife.app"}},"oauth_client":[],"api_key":[{"current_key":"ci_stub_key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],
            "configuration_version":"1"
          }
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      - name: Flutter build APK (CI)
        run: flutter build apk --debug

# ─────────────────────────────────────────────────────────────────
# FLUTTER JOBS  (master branch — apps/mobile)
#
# WHY master branch?
# The Flutter app lives on the master branch (separate from the
# backend/web code on main). These jobs only trigger on master.
# ─────────────────────────────────────────────────────────────────
  flutter-analyze:
    name: "Flutter / Dart Analyze"
    if: github.ref == 'refs/heads/master' || github.base_ref == 'master'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Get Flutter packages
        run: flutter pub get
      - name: Dart static analysis
        run: flutter analyze
        # Allow warnings during scaffold phase — remove once code is clean.
        continue-on-error: true

  flutter-test:
    name: "Flutter / Unit Tests"
    if: github.ref == 'refs/heads/master' || github.base_ref == 'master'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Get Flutter packages
        run: flutter pub get
      - name: Run unit tests
        run: flutter test

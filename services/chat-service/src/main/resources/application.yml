# APJ TRUE LIFE — chat-service v2.0
# STOMP WebSocket real-time messaging.

spring:
  application:
    name: chat-service
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DATABASE_URL_SESSION:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev}
    user: ""
    password: ""
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: ${DATABASE_URL_RUNTIME:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev&prepareThreshold=0}
    driver-class-name: org.postgresql.Driver

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info

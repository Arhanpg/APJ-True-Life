# APJ TRUE LIFE — media-service v2.0
# Supabase Storage with private buckets and signed URLs.
# SUPABASE_SERVICE_ROLE_KEY lives ONLY here.

spring:
  application:
    name: media-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8088

supabase:
  url: ${SUPABASE_URL:https://bwozwxrzotnlajutxupm.supabase.co}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:your-service-role-key-here}
  signed-url-ttl-documents: ${SIGNED_URL_TTL_SECONDS_DOCUMENTS:300}
  signed-url-ttl-avatars: ${SIGNED_URL_TTL_SECONDS_AVATARS:3600}

management:
  endpoints:
    web:
      exposure:
        include: health,info

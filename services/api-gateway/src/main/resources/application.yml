# APJ TRUE LIFE — api-gateway v2.0
# Single entry point: Dual JWT validation, rate limiting, CORS, routing.

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: ${ALLOWED_CORS_ORIGINS:http://localhost:3000}
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

firebase:
  project-id: ${FIREBASE_PROJECT_ID:apj-true-life-firebase}
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

auth:
  rs256-public-key: ${AUTH_SERVICE_RS256_PUBLIC_KEY:}

rate-limit:
  unauth-per-min: ${RATE_LIMIT_UNAUTH_PER_MIN:60}
  auth-per-min: ${RATE_LIMIT_AUTH_PER_MIN:500}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: patient-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/patients/**
        - id: doctor-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/doctors/**
        - id: treatment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/treatments/**
        - id: appointment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/appointments/**
        - id: chat-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/chat/**,/ws/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/notifications/**
        - id: media-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/media/**

---
spring:
  config:
    activate:
      on-profile: railway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_BASE_URL}
          predicates:
            - Path=/api/auth/**
        - id: patient-service
          uri: ${PATIENT_SERVICE_BASE_URL}
          predicates:
            - Path=/api/patients/**
        - id: doctor-service
          uri: ${DOCTOR_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/doctors/**
        - id: treatment-service
          uri: ${TREATMENT_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/treatments/**
        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/appointments/**
        - id: chat-service
          uri: ${CHAT_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/chat/**,/ws/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/notifications/**
        - id: media-service
          uri: ${MEDIA_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/media/**

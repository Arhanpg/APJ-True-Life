server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://apjtruelife.com"
              - "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/patients/**
        - id: doctor-service
          uri: ${DOCTOR_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/doctors/**,/api/v1/clinics/**
        - id: treatment-service
          uri: ${TREATMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/treatments/**,/api/v1/phases/**
        - id: appointment-service
          uri: ${APPOINTMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/appointments/**
        - id: chat-service
          uri: ${CHAT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/chat/**,/ws/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/notifications/**
        - id: media-service
          uri: ${MEDIA_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/media/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

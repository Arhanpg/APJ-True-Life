# APJ TRUE LIFE — auth-service v2.0
# Doctor/Admin custom authentication with RS256 JWT.
# Patient authentication handled by Firebase Auth (not this service).

spring:
  application:
    name: auth-service

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DATABASE_URL_SESSION:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev}
    user: ""
    password: ""
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

jwt:
  private-key: ${JWT_RS256_PRIVATE_KEY:LOCAL_DEV_STUB_REPLACE_WITH_GENERATED_RS256_PRIVATE_KEY}
  public-key: ${JWT_RS256_PUBLIC_KEY:LOCAL_DEV_STUB_REPLACE_WITH_GENERATED_RS256_PUBLIC_KEY}
  access-token-expiry-minutes: 15
  refresh-token-expiry-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

---
# LOCAL PROFILE — uses docker-compose.dev.yml Postgres
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev&prepareThreshold=0
    driver-class-name: org.postgresql.Driver
  flyway:
    url: jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev

---
# CI PROFILE
spring:
  config:
    activate:
      on-profile: ci
  datasource:
    url: ${DATABASE_URL_RUNTIME:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev&prepareThreshold=0}
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${DATABASE_URL_SESSION:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev}

---
# RAILWAY PROFILE — all secrets injected via Railway environment variables
spring:
  config:
    activate:
      on-profile: railway
  datasource:
    url: ${DATABASE_URL_RUNTIME}?prepareThreshold=0
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${DATABASE_URL_SESSION}

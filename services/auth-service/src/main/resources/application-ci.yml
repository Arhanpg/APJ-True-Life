# CI profile — used during GitHub Actions builds
# Uses H2 in-memory database so no real PostgreSQL is needed
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: false
app:
  firebase:
    project-id: ci-placeholder
    service-account-path: ci-placeholder

# APJ TRUE LIFE — notification-service v2.0
# FCM Push Notifications via Firebase Admin SDK.
# FIREBASE_SERVICE_ACCOUNT_JSON lives ONLY here and in api-gateway.

spring:
  application:
    name: notification-service
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DATABASE_URL_SESSION:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev}
    user: ""
    password: ""
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: ${DATABASE_URL_RUNTIME:jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev&prepareThreshold=0}
    driver-class-name: org.postgresql.Driver

server:
  port: 8087

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# APJ TRUE LIFE — notification-service
# NOTE: This is the ONLY service that uses Firebase Admin SDK — scoped to messaging() ONLY.
# Firebase Auth is NOT used here. Do not add any firebase.auth() calls.

spring:
  application:
    name: notification-service
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DATABASE_URL_SESSION}
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8087

# Firebase Admin SDK — FCM messaging scope ONLY
firebase:
  service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY}  # base64-encoded JSON
  # IMPORTANT: This SDK instance is initialised for messaging() only.
  # Do NOT add firebase.auth() usage — auth is handled by auth-service.

gateway:
  internal-secret: ${INTERNAL_GATEWAY_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev&prepareThreshold=0
    driver-class-name: org.postgresql.Driver
  flyway:
    url: jdbc:postgresql://localhost:5432/apjtruelife?user=apjdev&password=apjdev

firebase:
  service-account-key: LOCAL_STUB_BASE64_KEY

gateway:
  internal-secret: local-dev-internal-secret

---
spring:
  config:
    activate:
      on-profile: railway
  datasource:
    url: ${DATABASE_URL_RUNTIME}?prepareThreshold=0
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${DATABASE_URL_SESSION}

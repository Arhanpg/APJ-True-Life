name: apj_true_life
description: APJ TRUE LIFE — Ayurvedic Medical Centre Patient App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.3

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI & Media
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

  # WebSocket (Chat)
  web_socket_channel: ^3.0.0
  stomp_dart_client: ^1.2.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  image_cropper: ^7.0.5
  open_filex: ^4.5.0
  shimmer: ^3.0.0
  pinput: ^5.0.0
  smooth_page_indicator: ^1.1.0
  percent_indicator: ^4.2.3
  timeago: ^3.7.0
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
